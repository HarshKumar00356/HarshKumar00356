<svg width="680" height="720" viewBox="0 0 680 720" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes counter { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
    @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-7px)} }
    .orbit-group { transform-origin:340px 330px; animation:spin 20s linear infinite; }
    .icon-wrap { animation:counter 20s linear infinite; transform-origin:0px 0px; }
    .avatar-g { transform-origin:340px 330px; animation:float 4s ease-in-out infinite; }
    .lbl { font-family:-apple-system,sans-serif; font-size:11px; fill:rgba(120,120,120,0.9); text-anchor:middle; }
    .ring { fill:none; stroke:rgba(150,150,150,0.25); stroke-width:1.2; stroke-dasharray:5 7; }
  </style>
  <clipPath id="clipRive">    <circle cx="0" cy="0" r="38"/></clipPath>
  <clipPath id="clipFramer">  <rect x="-38" y="-38" width="76" height="76" rx="18"/></clipPath>
  <clipPath id="clipFigma">   <circle cx="0" cy="0" r="38"/></clipPath>
  <clipPath id="clipNotion">  <rect x="-38" y="-38" width="76" height="76" rx="18"/></clipPath>
  <clipPath id="clipClaude">  <rect x="-38" y="-38" width="76" height="76" rx="18"/></clipPath>
  <clipPath id="clipAG">      <rect x="-38" y="-38" width="76" height="76" rx="18"/></clipPath>
  <clipPath id="clipMe">      <circle cx="0" cy="0" r="70"/></clipPath>
</defs>

<!-- Orbit ring -->
<circle class="ring" cx="340" cy="330" r="205"/>

<!-- CENTER: ME.svg -->
<g class="avatar-g">
  <circle cx="340" cy="330" r="72" fill="#f5ede8" stroke="rgba(180,160,140,0.3)" stroke-width="1.5"/>
  <g transform="translate(340,330)">
    <g clip-path="url(#clipMe)">
      <image href="ME.svg" x="-70" y="-70" width="140" height="140" preserveAspectRatio="xMidYMid slice"/>
    </g>
  </g>
  <text x="340" y="430" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="15" font-weight="600" fill="#3c3c3c">Harsh Kumar</text>
  <text x="340" y="450" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888">Product Designer</text>
</g>

<!-- ORBIT GROUP -->
<g class="orbit-group">

  <!-- 1. Rive — 0° -->
  <g transform="translate(340,125)">
    <g class="icon-wrap">
      <circle r="38" fill="white" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
      <g clip-path="url(#clipRive)">
        <image href="rivee.webp" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Rive</text>
    </g>
  </g>

  <!-- 2. Framer — 60° -->
  <g transform="translate(518,228)">
    <g class="icon-wrap">
      <rect x="-38" y="-38" width="76" height="76" rx="18" fill="black"/>
      <g clip-path="url(#clipFramer)">
        <image href="Framer.webp" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Framer</text>
    </g>
  </g>

  <!-- 3. Figma — 120° -->
  <g transform="translate(518,432)">
    <g class="icon-wrap">
      <circle r="38" fill="white" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
      <g clip-path="url(#clipFigma)">
        <image href="figma.png" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Figma</text>
    </g>
  </g>

  <!-- 4. Notion — 180° -->
  <g transform="translate(340,535)">
    <g class="icon-wrap">
      <rect x="-38" y="-38" width="76" height="76" rx="18" fill="black"/>
      <g clip-path="url(#clipNotion)">
        <image href="Notion-logo.svg.png" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Notion</text>
    </g>
  </g>

  <!-- 5. Claude — 240° -->
  <g transform="translate(162,432)">
    <g class="icon-wrap">
      <rect x="-38" y="-38" width="76" height="76" rx="18" fill="#D97757"/>
      <g clip-path="url(#clipClaude)">
        <image href="Claude.svg" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Claude</text>
    </g>
  </g>

  <!-- 6. Antigravity — 300° -->
  <g transform="translate(162,228)">
    <g class="icon-wrap">
      <rect x="-38" y="-38" width="76" height="76" rx="18" fill="#0a0a0a"/>
      <g clip-path="url(#clipAG)">
        <image href="antigravity-icon.png" x="-38" y="-38" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <text class="lbl" y="55">Antigravity</text>
    </g>
  </g>

</g>
</svg>
